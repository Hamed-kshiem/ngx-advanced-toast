<dialog
  #dialogRef
  class="toast"
  [attr.data-type]="toast().type"
  [attr.data-state]="toast().state"
  [attr.data-position]="toast().position"
  [attr.aria-live]="toast().type === 'error' ? 'assertive' : 'polite'"
  [attr.aria-atomic]="true"
  [attr.role]="ariaRole()"
  (mouseenter)="onMouseEnter()"
  (mouseleave)="onMouseLeave()"
>
  <div class="toast__body">
    <!-- Icon -->
    <span
      class="toast__icon"
      [attr.data-type]="toast().type"
      [innerHTML]="iconHtml()"
    ></span>

    <!-- Text content -->
    <div class="toast__content">
      @if (toast().title) {
        <strong class="toast__title">{{ toast().title }}</strong>
      }
      <p class="toast__message">{{ toast().message }}</p>
    </div>

    <!-- Close button -->
    @if (toast().dismissible) {
      <button
        class="toast__close"
        type="button"
        aria-label="Close notification"
        (click)="onDismiss()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    }
  </div>

  <!-- Action buttons -->
  @if (toast().actions && toast().actions.length > 0) {
    <div class="toast__actions">
      @for (action of toast().actions; track action.label) {
        <button
          class="toast__action"
          type="button"
          [attr.data-style]="action.style ?? 'primary'"
          (click)="onAction(action)"
        >
          {{ action.label }}
        </button>
      }
    </div>
  }

  <!-- Progress bar -->
  @if (toast().showProgress && toast().duration > 0) {
    <div
      class="toast__progress"
      [class.toast__progress--paused]="isPaused()"
      [style.animation-duration]="toast().duration + 'ms'"
    ></div>
  }
</dialog>
